<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שומרים - מאגר חופש המידע</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f9fafb; }
        .card:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-black rounded flex items-center justify-center text-white font-bold text-xl">ש</div>
                <div>
                    <h1 class="text-2xl font-bold text-black leading-tight">שומרים</h1>
                    <p class="text-gray-500 text-sm">מאגר חופש המידע הלאומי</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <section class="mb-12">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <input type="text" id="searchInput" placeholder="חפשו דוח, רשות או מילת מפתח..." 
                    class="w-full p-4 border border-gray-300 rounded-lg text-lg focus:ring-2 focus:ring-black focus:border-transparent outline-none transition-all">
                
                <div class="flex flex-wrap gap-2 mt-4" id="categoryFilters">
                    <button onclick="filterCategory('הכל')" class="px-4 py-2 rounded-full bg-black text-white text-sm font-medium">הכל</button>
                    <button onclick="filterCategory('ביטחון')" class="px-4 py-2 rounded-full bg-gray-100 text-gray-700 text-sm font-medium hover:bg-gray-200">ביטחון</button>
                    <button onclick="filterCategory('איכות סביבה')" class="px-4 py-2 rounded-full bg-gray-100 text-gray-700 text-sm font-medium hover:bg-gray-200">איכות סביבה</button>
                    <button onclick="filterCategory('חינוך')" class="px-4 py-2 rounded-full bg-gray-100 text-gray-700 text-sm font-medium hover:bg-gray-200">חינוך</button>
                    <button onclick="filterCategory('רשויות מקומיות')" class="px-4 py-2 rounded-full bg-gray-100 text-gray-700 text-sm font-medium hover:bg-gray-200">רשויות מקומיות</button>
                </div>
            </div>
        </section>

        <div class="mb-6 flex justify-between items-center text-gray-600">
            <span id="resultCount">טוען נתונים...</span>
        </div>

        <div id="reportsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // נתוני דוגמה - בהמשך נחבר את זה לדרייב או לקובץ חיצוני
        const allReports = [
            { id: 1, title: "דוח זיהום נחלים בצפון", authority: "המשרד להגנת הסביבה", category: "איכות סביבה", date: "12/05/2024", link: "#" },
            { id: 2, title: "תקציב רכש ביטחוני 2023", authority: "משרד הביטחון", category: "ביטחון", date: "10/05/2024", link: "#" },
            { id: 3, title: "פרוטוקול ועדת תכנון ובנייה", authority: "עיריית תל אביב", category: "רשויות מקומיות", date: "01/05/2024", link: "#" },
            { id: 4, title: "נתוני זכאות לבגרות לפי ערים", authority: "משרד החינוך", category: "חינוך", date: "28/04/2024", link: "#" }
        ];

        let filteredReports = [...allReports];

        function renderReports() {
            const grid = document.getElementById('reportsGrid');
            const count = document.getElementById('resultCount');
            
            grid.innerHTML = filteredReports.map(report => `
                <div class="card bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-between">
                    <div>
                        <span class="text-xs font-bold uppercase tracking-wider text-blue-600 mb-2 block">${report.category}</span>
                        <h3 class="text-xl font-bold text-gray-900 mb-2">${report.title}</h3>
                        <p class="text-gray-600 text-sm mb-4">${report.authority}</p>
                    </div>
                    <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
                        <span class="text-gray-400 text-xs">${report.date}</span>
                        <a href="${report.link}" class="text-black font-semibold text-sm hover:underline">צפייה בדוח ←</a>
                    </div>
                </div>
            `).join('');
            
            count.innerText = `נמצאו ${filteredReports.length} דוחות`;
        }

        // חיפוש חכם
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            filteredReports = allReports.filter(r => 
                r.title.toLowerCase().includes(term) || 
                r.authority.toLowerCase().includes(term)
            );
            renderReports();
        });

        // סינון קטגוריות
        function filterCategory(cat) {
            if (cat === 'הכל') {
                filteredReports = [...allReports];
            } else {
                filteredReports = allReports.filter(r => r.category === cat);
            }
            renderReports();
        }

        // הרצה ראשונית
        renderReports();
    </script>
</body>
</html>
